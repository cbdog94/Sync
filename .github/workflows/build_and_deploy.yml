name: Build and deploy .NET + Vue.js app to Azure App Service
permissions:
  contents: read

on:
  push:
    branches:
      - main

env:
  WEBAPP_NAME: "sync-jp"
  DOTNET_VERSION: "10.x"
  NODE_VERSION: "24"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install and build Vue.js frontend
        working-directory: ./Sync.Frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish .NET backend
        working-directory: ./Sync.Backend
        run: dotnet publish -c Release -o ./publish

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v7
        with:
          name: deploy-package
          path: Sync.Backend/publish

  deploy-to-webapp:
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: deploy-package
          path: .

      - name: Log in to Azure CLI
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3 # v3.0.6 v3
        with:
          app-name: ${{ env.WEBAPP_NAME}}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
